name: tests

on:
  pull_request:
    branches: [main]

jobs:
  linting_and_tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn test
